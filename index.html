<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MISAKROOS Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    th, td { padding: 12px 10px; text-align: left; }
    tr:hover { background-color: #f8fafc; }
    .vencido { color: #dc2626; font-weight: 700; }
    .por-vencer { color: #d97706; font-weight: 700; }
  </style>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-7xl mx-auto">
  <h1 class="text-4xl font-bold text-gray-900 mb-2">📊 MISAKROOS Panel</h1>
  <p id="status" class="text-green-600 mb-6 font-medium"></p>

  <!-- KPIs -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="kpis"></div>

  <!-- Filtros -->
  <div class="bg-white p-5 rounded-2xl shadow mb-6 flex flex-wrap gap-4">
    <input type="text" id="search" placeholder="🔎 Buscar nombre o teléfono..." 
           class="flex-1 px-5 py-3 border rounded-xl focus:outline-none focus:border-blue-500">
    <select id="filterEstado" class="px-5 py-3 border rounded-xl">
      <option value="">Todos los estados</option>
    </select>
    <select id="filterServicio" class="px-5 py-3 border rounded-xl">
      <option value="">Todos los servicios</option>
    </select>
  </div>

  <!-- Tabla -->
  <div class="bg-white rounded-2xl shadow overflow-x-auto">
    <table class="w-full">
      <thead class="bg-gray-800 text-white">
        <tr>
          <th class="p-4 text-left">ID</th>
          <th class="p-4 text-left">Nombre</th>
          <th class="p-4 text-left">Teléfono</th>
          <th class="p-4 text-left">Servicio</th>
          <th class="p-4 text-left">Vencimiento</th>
          <th class="p-4 text-center">Días Rest.</th>
          <th class="p-4 text-center">Estado</th>
          <th class="p-4 text-center">WA</th>
        </tr>
      </thead>
      <tbody id="tablaBody" class="divide-y"></tbody>
    </table>
  </div>
</div>

<script>
  const SHEET_ID = '1NWkg9LGNKOmupqRFGbtDwIMSPEUye2b_z7l35aDOjIE';
  let datos = [];

  async function cargarDatos() {
    const status = document.getElementById('status');
    status.textContent = '🔄 Cargando datos...';

    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Tabla_1`;
      const res = await fetch(url);
      const text = await res.text();

      // Parseo más seguro
      const start = text.indexOf('{');
      const end = text.lastIndexOf('}') + 1;
      const jsonStr = text.substring(start, end);
      const json = JSON.parse(jsonStr);

      datos = json.table.rows.map(row => {
        const c = row.c || [];
        return {
          id: c[0]?.v || '',
          nombre: c[1]?.v || '',
          telefono: c[2]?.v || '',
          servicio: c[3]?.v || '',
          vencimiento: c[6]?.v || '',
          estado: c[7]?.v || '',
          dias: parseInt(c[10]?.v) || 0
        };
      }).filter(r => r.nombre && r.nombre.trim() !== '');

      status.innerHTML = `✅ ${datos.length} clientes cargados correctamente`;
      renderizar();
    } catch (e) {
      console.error(e);
      status.innerHTML = `❌ Error al cargar.<br>Intentá refrescar (F5) o avisame.`;
    }
  }

  function renderizar() {
    const search = document.getElementById('search').value.toLowerCase().trim();
    const estadoFiltro = document.getElementById('filterEstado').value;
    const servicioFiltro = document.getElementById('filterServicio').value;

    const filtrados = datos.filter(r => {
      const busca = !search || 
        r.nombre.toLowerCase().includes(search) || 
        String(r.telefono).includes(search);
      const est = !estadoFiltro || r.estado === estadoFiltro;
      const serv = !servicioFiltro || r.servicio === servicioFiltro;
      return busca && est && serv;
    });

    // KPIs
    const total = filtrados.length;
    const activos = filtrados.filter(r => r.estado === 'Activo').length;
    const porVencer = filtrados.filter(r => r.dias > 0 && r.dias <= 7).length;
    const vencidos = filtrados.filter(r => r.dias <= 0).length;

    document.getElementById('kpis').innerHTML = `
      <div class="bg-white p-6 rounded-2xl shadow text-center">
        <p class="text-sm text-gray-500">Total</p>
        <p class="text-4xl font-bold">${total}</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow text-center">
        <p class="text-sm text-green-600">Activos</p>
        <p class="text-4xl font-bold text-green-600">${activos}</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow text-center">
        <p class="text-sm text-orange-600">Por vencer (7d)</p>
        <p class="text-4xl font-bold text-orange-600">${porVencer}</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow text-center">
        <p class="text-sm text-red-600">Vencidos</p>
        <p class="text-4xl font-bold text-red-600">${vencidos}</p>
      </div>
    `;

    // Filtro servicios
    const servicios = [...new Set(datos.map(r => r.servicio).filter(Boolean))].sort();
    const sel = document.getElementById('filterServicio');
    if (sel.options.length < 3) {
      servicios.forEach(s => sel.add(new Option(s, s)));
    }

    // Tabla
    let html = '';
    filtrados.forEach(r => {
      const clase = r.dias <= 0 ? 'vencido' : (r.dias <= 7 ? 'por-vencer' : '');
      html += `
        <tr class="hover:bg-gray-50">
          <td class="p-4">${r.id}</td>
          <td class="p-4 font-medium">${r.nombre}</td>
          <td class="p-4">${r.telefono || ''}</td>
          <td class="p-4">${r.servicio || ''}</td>
          <td class="p-4">${r.vencimiento || ''}</td>
          <td class="p-4 text-center ${clase}">${r.dias}</td>
          <td class="p-4 text-center">
            <span class="px-4 py-1 rounded-full text-xs font-medium ${r.estado === 'Activo' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
              ${r.estado}
            </span>
          </td>
          <td class="p-4 text-center">
            ${r.telefono ? `<a href="https://wa.me/${r.telefono.replace(/\D/g,'')}" target="_blank" class="text-3xl hover:scale-110">💬</a>` : ''}
          </td>
        </tr>`;
    });

    document.getElementById('tablaBody').innerHTML = html || `<tr><td colspan="8" class="p-12 text-center text-gray-400">No se encontraron resultados</td></tr>`;
  }

  // Eventos
  document.getElementById('search').addEventListener('input', renderizar);
  document.getElementById('filterEstado').addEventListener('change', renderizar);
  document.getElementById('filterServicio').addEventListener('change', renderizar);

  // Carga
  cargarDatos();
  setInterval(cargarDatos, 30000);
</script>
</body>
</html>
